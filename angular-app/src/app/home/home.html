<div class="min-h-screen bg-gradient-to-b from-pink-50 to-white">

  <!-- Hero Section -->
  <app-hero></app-hero>
  <div class="max-w-6xl mx-auto px-6 py-6">

    <!-- Featured Product -->
    @if (featuredProduct; as product) {
      <app-featured [featured]="product"></app-featured>
    }

    <!-- Features Section -->
    <div class="mt-20 grid md:grid-cols-3 gap-8">
      <div class="text-center">
        <div class="text-4xl mb-4">🍰</div>
        <h3 class="text-xl font-bold text-gray-900 mb-2">Fresh Daily</h3>
        <p class="text-gray-600">All our baked goods are made fresh every morning</p>
      </div>
      <div class="text-center">
        <div class="text-4xl mb-4">💬</div>
        <h3 class="text-xl font-bold text-gray-900 mb-2">Customer Reviews</h3>
        <p class="text-gray-600">Read what others love and share your favorites</p>
      </div>
      <div class="text-center">
        <div class="text-4xl mb-4">🎁</div>
        <h3 class="text-xl font-bold text-gray-900 mb-2">Perfect Gifts</h3>
        <p class="text-gray-600">Treat yourself or someone special to artisan baked goods</p>
      </div>
    </div>
  </div>
</div>
